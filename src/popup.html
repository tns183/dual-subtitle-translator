<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #1c1d1f;
      color: #fff;
    }

    h2 {
      font-size: 14px;
      margin: 0 0 14px;
      color: #F5821A;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    label {
      font-size: 13px;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }

    .toggle input {
      display: none;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked+.slider {
      background: #F5821A;
    }

    input:checked+.slider::before {
      transform: translateX(18px);
    }

    #status {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 14px;
    }

    select {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 8px;
      font-size: 12px;
      background: #333;
      color: #ccc;
      border: 1px solid #555;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>
  <h2>Dual Subtitle Translator</h2>
  <div class="row">
    <label>Translate subtitles</label>
    <label class="toggle">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div id="status">Disabled</div>
  <div class="row">
    <label>Target language</label>
    <select id="langSelect">
      <option value="vi">Vietnamese</option>
      <option value="ja">Japanese</option>
      <option value="zh-CN">Chinese</option>
      <option value="ko">Korean</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
    </select>
  </div>
  <button id="clearCache">Clear cache</button>
  <script src="popup.js"></script>
</body>

</html>
